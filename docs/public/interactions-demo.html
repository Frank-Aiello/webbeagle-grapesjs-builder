<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confetti Test — WebBeagle Interactions</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a0a; font-family: system-ui, sans-serif;
    }
    .btn {
      padding: 20px 60px; font-size: 24px; font-weight: 700;
      background: linear-gradient(135deg, #A383E6, #6C4AB6);
      color: #fff; border: none; border-radius: 16px;
      cursor: pointer; letter-spacing: 1px;
      transition: transform .2s, box-shadow .2s;
    }
    .btn:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(163,131,230,.4); }
    .btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <button class="btn" data-interact-trigger>&#127881; Click Me!</button>

  <script src="wp-interactions-full.js"></script>
  <script>
    InteractRunner.configure([{
      "key": "confetti_test",
      "title": "Confetti on Click",
      "type": "click",
      "target": { "type": "trigger", "value": "", "blockName": "", "options": "" },
      "timelines": [{
        "loop": false, "onceOnly": false, "alternate": false,
        "reset": false, "reverse": false,
        "actions": [{
          "type": "confetti",
          "key": "c1",
          "target": { "type": "trigger", "value": "", "blockName": "", "options": "" },
          "timing": {
            "isStartingState": false, "start": 0, "duration": 0.5,
            "easing": "outCirc", "customEasing": "", "stagger": 0
          },
          "value": {}
        }]
      }],
      "options": []
    }]);
  </script>
</body>
</html>
